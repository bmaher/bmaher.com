map $sent_http_content_type $expires {
  default off;
  text/html epoch;
  text/css max;
  application/javascript max;
  ~image/ max;
}

server {
  listen 0.0.0.0:80;
  server_name _;

  root /var/www/html/website;
  index index.html index.htm;

	error_page 404 /404.html;
  location = /404.html {
    root /var/www/html/website;
  }

  access_log /dev/stdout;
  error_log /dev/stdout info;

  expires $expires;
}
